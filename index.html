<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Furnace Builder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1814;
      color: #d4c4a8;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Toolbar ─────────────────────────────────────────────────────── */
    #toolbar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      padding: 6px 10px;
      background: #252019;
      border-bottom: 1px solid #3a2e1e;
      flex-shrink: 0;
    }
    .sep { width: 1px; height: 22px; background: #3a2e1e; margin: 0 2px; }
    label { color: #a09070; font-size: 12px; }

    button, .btn-tool {
      padding: 4px 10px;
      border: 1px solid #4a3a24;
      border-radius: 4px;
      background: #2e2418;
      color: #d4c4a8;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.15s;
    }
    button:hover, .btn-tool:hover { background: #3e3222; }
    button.active, .btn-tool.active { background: #7a5030; border-color: #c87840; color: #fff; }

    input[type=number] {
      width: 52px;
      padding: 3px 6px;
      background: #1e1810;
      border: 1px solid #4a3a24;
      border-radius: 4px;
      color: #d4c4a8;
      font-size: 12px;
    }

    /* ── Main area ───────────────────────────────────────────────────── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left panel ──────────────────────────────────────────────────── */
    #left-panel {
      width: 168px;
      min-width: 168px;
      background: #201a12;
      border-right: 1px solid #3a2e1e;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #left-panel h3 { padding: 8px 10px 4px; color: #b09060; font-size: 12px; letter-spacing: .05em; }
    #row-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 6px;
    }
    #row-list::-webkit-scrollbar { width: 6px; }
    #row-list::-webkit-scrollbar-track { background: #201a12; }
    #row-list::-webkit-scrollbar-thumb { background: #4a3a24; border-radius: 3px; }

    .row-item {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 4px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .row-item:hover { background: #2e2418; }
    .row-item.selected { background: #4a3020; }
    .row-item span { flex: 1; font-size: 12px; }
    .row-item .badge {
      font-size: 10px;
      padding: 1px 4px;
      border-radius: 3px;
      background: #3a2a16;
      color: #a08060;
    }
    .btn-offset {
      font-size: 10px;
      padding: 1px 4px;
      border: 1px solid #3a2a16;
      border-radius: 3px;
      background: #1e1810;
      color: #a08060;
      cursor: pointer;
    }
    .btn-offset.on { background: #3a5020; border-color: #608040; color: #a0d060; }

    #left-panel footer {
      padding: 6px;
      border-top: 1px solid #3a2e1e;
    }
    #left-panel footer button { width: 100%; }

    #brick-counts-panel {
      border-top: 1px solid #3a2e1e;
      padding: 4px 6px 6px;
      flex-shrink: 0;
    }
    #brick-counts-panel h3 { padding: 4px 4px 4px; color: #b09060; font-size: 11px; letter-spacing: .05em; }
    .count-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2px 4px;
      font-size: 11px;
      border-radius: 3px;
    }
    .count-item:hover { background: #2a2016; }
    .count-item .ct-label { color: #a09070; }
    .count-item .ct-val   { color: #d4c4a8; font-weight: bold; min-width: 28px; text-align: right; }
    .count-total {
      display: flex;
      justify-content: space-between;
      padding: 3px 4px 1px;
      font-size: 11px;
      border-top: 1px solid #3a2e1e;
      margin-top: 2px;
      color: #c8a860;
    }

    /* ── Tool panel ──────────────────────────────────────────────────── */
    #tool-panel {
      width: 72px;
      min-width: 72px;
      background: #201a12;
      border-right: 1px solid #3a2e1e;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 4px;
      padding: 6px 5px;
      overflow-y: auto;
      flex-shrink: 0;
    }
    #tool-panel h3 { padding: 2px 0 4px; color: #b09060; font-size: 11px; letter-spacing: .05em; text-align: center; }
    #tool-panel .btn-tool { width: 100%; padding: 5px 2px; font-size: 11px; text-align: center; }

    /* ── Content (3D + grid) ─────────────────────────────────────────── */
    #content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #viewport {
      flex: 0 0 55%;
      position: relative;
      overflow: hidden;
      background: #1a1814;
    }
    #viewport canvas { display: block; width: 100% !important; height: 100% !important; }

    /* общий контейнер справа: вертикальный срез | стрелки+зум | горизонтальный срез */
    #slice-panel {
      position: absolute;
      bottom: 10px;
      right: 10px;
      display: flex;
      flex-direction: row;
      align-items: flex-end;
      gap: 6px;
    }
    /* колонка одного ползунка */
    .slice-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .slice-lbl {
      font-size: 10px;
      color: #d4b880;
      background: rgba(20,16,10,0.78);
      border: 1px solid #3a2e1e;
      border-radius: 4px;
      padding: 2px 4px;
      white-space: nowrap;
    }
    .slice-range {
      writing-mode: vertical-lr;
      direction: rtl;
      width: 22px;
      height: 120px;
      accent-color: #c87840;
      cursor: pointer;
    }

    #viewport-hint {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: rgba(20,16,10,0.72);
      border: 1px solid #3a2e1e;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 11px;
      color: #a09070;
      line-height: 1.7;
      pointer-events: none;
      user-select: none;
    }
    #viewport-hint span { color: #d4b880; }

    #viewport-controls {
      display: flex;
      gap: 6px;
      align-items: flex-end;
    }
    /* D-pad: 3×3 grid */
    .vpc-dpad {
      display: grid;
      grid-template-columns: repeat(3, 30px);
      grid-template-rows: repeat(3, 30px);
      gap: 3px;
    }
    /* Zoom: vertical column */
    .vpc-zoom {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    #viewport-controls button {
      width: 30px;
      height: 30px;
      padding: 0;
      font-size: 15px;
      background: rgba(20,16,10,0.82);
      border: 1px solid #3a2e1e;
      border-radius: 5px;
      color: #d4c4a8;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
    }
    #viewport-controls button:hover  { background: rgba(62,42,20,0.92); }
    #viewport-controls button:active { background: rgba(100,60,25,0.98); }
    #btn-3d-up    { grid-column: 2; grid-row: 1; }
    #btn-3d-left  { grid-column: 1; grid-row: 2; }
    #btn-3d-reset { grid-column: 2; grid-row: 2; font-size: 11px; }
    #btn-3d-right { grid-column: 3; grid-row: 2; }
    #btn-3d-down  { grid-column: 2; grid-row: 3; }

    #grid-wrap {
      flex: 1;
      overflow: auto;
      background: #181410;
      border-top: 1px solid #3a2e1e;
    }
    #grid-wrap::-webkit-scrollbar { width: 8px; height: 8px; }
    #grid-wrap::-webkit-scrollbar-track { background: #181410; }
    #grid-wrap::-webkit-scrollbar-thumb { background: #4a3a24; border-radius: 4px; }

    #grid-canvas { display: block; cursor: crosshair; }

    /* ── Status bar ──────────────────────────────────────────────────── */
    #status {
      padding: 4px 12px;
      background: #201a12;
      border-top: 1px solid #3a2e1e;
      font-size: 11px;
      color: #a09070;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<!-- ── Toolbar ─────────────────────────────────────────────────────────── -->
<div id="toolbar">
  <label>Перевязка:</label>
  <button class="btn-tool active" data-bond="Chain">Цепная</button>
  <button class="btn-tool" data-bond="Cross">Крестовая</button>

  <div class="sep"></div>
  <button id="btn-fill">Заполнить ряд</button>
  <button id="btn-clear">Очистить ряд</button>

  <div class="sep"></div>
  <label>Ш:</label>
  <input type="number" id="inp-cols" value="20" min="2" max="120" />
  <label>Г:</label>
  <input type="number" id="inp-depths" value="8" min="1" max="60" />

  <div class="sep"></div>
  <label style="display:flex;align-items:center;gap:4px;cursor:pointer">
    <input type="checkbox" id="chk-mortar" style="accent-color:#c87840"> Швы
  </label>

  <div class="sep"></div>
  <button id="btn-save">💾 Сохранить</button>
  <button id="btn-load">📂 Открыть</button>
  <button id="btn-export-png">🖼 Экспорт PNG</button>
  <input type="file" id="file-input" accept=".json" style="display:none" />
</div>

<!-- ── Main ───────────────────────────────────────────────────────────── -->
<div id="main">

  <!-- Left panel: rows -->
  <div id="left-panel">
    <h3>РЯДЫ</h3>
    <div id="row-list"></div>
    <footer>
      <button id="btn-add-row">+ Ряд</button>
    </footer>
    <div id="brick-counts-panel">
      <h3>РАСХОД</h3>
      <div id="brick-counts"></div>
    </div>
  </div>

  <!-- Tool panel: brick types -->
  <div id="tool-panel">
    <h3>КИРПИЧ</h3>
    <button class="btn-tool active" data-tool="FullStretcher">Ложок</button>
    <button class="btn-tool" data-tool="FullHeader">Тычок</button>
    <button class="btn-tool" data-tool="ThreeQuarter">3/4</button>
    <button class="btn-tool" data-tool="Half">1/2</button>
    <button class="btn-tool" data-tool="Hole">Отверстие</button>
    <button class="btn-tool" data-tool="VerticalStretcher">На ребро</button>
  </div>

  <!-- 3D + 2D -->
  <div id="content">
    <div id="viewport">
      <div id="viewport-hint">
        <span>ЛКМ</span> — вращение&nbsp;&nbsp;
        <span>🖱 колёсико</span> — масштаб&nbsp;&nbsp;
        <span>ПКМ</span> — панорама
      </div>
      <div id="slice-panel">
        <!-- вертикальный срез (колонки, ось X) -->
        <div class="slice-col">
          <span class="slice-lbl" id="sliceX-label">X</span>
          <input class="slice-range" type="range" id="sliceX-slider" min="1" max="1" value="1" step="1" />
        </div>
        <div id="viewport-controls">
          <div class="vpc-dpad">
            <button id="btn-3d-up">▲</button>
            <button id="btn-3d-left">◀</button>
            <button id="btn-3d-reset" title="Сбросить вид">⌂</button>
            <button id="btn-3d-right">▶</button>
            <button id="btn-3d-down">▼</button>
          </div>
          <div class="vpc-zoom">
            <button id="btn-3d-zoomin"  title="Приблизить">+</button>
            <button id="btn-3d-zoomout" title="Отдалить">−</button>
          </div>
        </div>
        <!-- горизонтальный срез (ряды, ось Y) -->
        <div class="slice-col">
          <span class="slice-lbl" id="slice-label">Y</span>
          <input class="slice-range" type="range" id="slice-slider" min="1" max="1" value="1" step="1" />
        </div>
      </div>
    </div>
    <div id="grid-wrap">
      <canvas id="grid-canvas"></canvas>
    </div>
  </div>

</div>

<!-- Status bar -->
<div id="status" id="status">Ряд: 1/3 | Кирпичей: 0 | Инструмент: Ложок</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
